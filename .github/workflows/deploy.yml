name: Build and Deploy

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      # ✅ Step 1: ล้างสิทธิ์ไฟล์เก่าก่อน Checkout (แก้ git config lock error)
      - name: Pre-cleanup Permissions
        run: |
          docker run --rm -v $(pwd):/work -w /work busybox chown -R $(id -u):$(id -g) . || true

      # ✅ Step 2: Checkout ก่อน เพื่อให้มี .env.example อ่านค่า STUDENT_ID ได้
      - uses: actions/checkout@v4

      # ✅ Step 3: อ่าน STUDENT_ID จาก .env.example (ตอนนี้ไฟล์มีแล้ว)
      - name: Prepare Environment Variables
        run: |
          export STUDENT_ID=$(grep '^STUDENT_ID=' .env.example | cut -d '=' -f2 | tr -d '\r ')

          if [ ! -z "$STUDENT_ID" ]; then
            export STUDENT_NAME=$STUDENT_ID
          else
            export STUDENT_NAME=$(whoami)
          fi

          echo "STUDENT_NAME=${STUDENT_NAME}" >> $GITHUB_ENV
          mkdir -p /tmp/${STUDENT_NAME}-env-backups
          echo "BACKUP_DIR=/tmp/${STUDENT_NAME}-env-backups" >> $GITHUB_ENV
          echo "✅ STUDENT_NAME=${STUDENT_NAME}"

      # ✅ Step 4: Backup .env เดิมก่อน (ถ้ามี)
      - name: Backup .env
        run: |
          if [ -f .env ]; then
            cp .env ${{ env.BACKUP_DIR }}/.env.backup
            echo "Backed up .env"
          fi

      # ✅ Step 5: Restore/Update .env
      - name: Restore and Update .env
        run: |
          if [ -f ${{ env.BACKUP_DIR }}/.env.backup ]; then
            cp ${{ env.BACKUP_DIR }}/.env.backup .env
            echo "Restored .env from backup"
          else
            cp .env.example .env
            echo "Created .env from .env.example"
          fi

          update_env() {
            sed -i "/^#*$1=/d" .env
            echo "$1=$2" >> .env
          }

          # Sync keys จาก .env.example เข้า .env
          KEYS="STUDENT_ID STUDENT_NAME COMPOSE_PROJECT_NAME STUDENT_PORT FORWARD_DB_PORT DB_CONNECTION DB_PORT DB_DATABASE DB_USERNAME DB_PASSWORD"
          for KEY in $KEYS; do
            VAL=$(grep "^$KEY=" .env.example | cut -d '=' -f2- | tr -d '\r')
            if [ ! -z "$VAL" ]; then
              update_env "$KEY" "$VAL"
            fi
          done

          # Set DB_HOST ให้ตรงกับ container name จริง
          update_env "DB_HOST" "${{ env.STUDENT_NAME }}-db"

      # ✅ Step 6: หยุด Containers เก่า
      - name: Stop Existing Containers
        run: |
          STUDENT_NAME=${{ env.STUDENT_NAME }}
          docker stop ${STUDENT_NAME}-app ${STUDENT_NAME}-nginx ${STUDENT_NAME}-db 2>/dev/null || true
          docker rm   ${STUDENT_NAME}-app ${STUDENT_NAME}-nginx ${STUDENT_NAME}-db 2>/dev/null || true
          docker compose -p ${STUDENT_NAME} down --remove-orphans 2>/dev/null || true

          # ฆ่า container ที่ยึดพอร์ตเดิมอยู่
          for PORT in $(grep -E '^(STUDENT_PORT|FORWARD_DB_PORT)=' .env.example | cut -d '=' -f2 | tr -d '\r '); do
            PORT_CONTAINER=$(docker ps -q --filter "publish=${PORT}" 2>/dev/null)
            if [ ! -z "$PORT_CONTAINER" ]; then
              echo "⚠️  Killing container using port ${PORT}"
              docker stop $PORT_CONTAINER 2>/dev/null || true
              docker rm   $PORT_CONTAINER 2>/dev/null || true
            fi
          done

      # ✅ Step 7: Build และ Start Docker Containers
      - name: Docker Deploy
        run: |
          STUDENT_NAME=${{ env.STUDENT_NAME }}
          STUDENT_PORT=$(grep '^STUDENT_PORT=' .env.example | cut -d '=' -f2 | tr -d '\r ' || echo "80")
          STUDENT_NAME=${STUDENT_NAME} STUDENT_PORT=${STUDENT_PORT} \
          docker compose -p ${STUDENT_NAME} up -d --build --force-recreate

      # ✅ Step 8: Build Frontend Assets ด้วย bun
      - name: Build Frontend Assets
        run: |
          APP_CONTAINER="${{ env.STUDENT_NAME }}-app"
          docker exec -u root $APP_CONTAINER bun install
          docker exec -u root $APP_CONTAINER bun run build
          echo "✅ Frontend assets built successfully"

      # ✅ Step 9: Laravel Post-Deploy
      - name: Laravel Post-Deploy
        run: |
          APP_CONTAINER="${{ env.STUDENT_NAME }}-app"

          docker exec -u root $APP_CONTAINER chown -R www-data:www-data storage bootstrap/cache .env
          docker exec -u root $APP_CONTAINER chmod -R 775 storage bootstrap/cache
          docker exec -u root $APP_CONTAINER chmod 664 .env

          docker exec $APP_CONTAINER php artisan config:clear
          docker exec $APP_CONTAINER php artisan key:generate --force
          docker exec $APP_CONTAINER php artisan migrate --force
          docker exec $APP_CONTAINER php artisan storage:link || true
          docker exec $APP_CONTAINER php artisan optimize:clear

      # ✅ Step 10: Cleanup
      - name: System Cleanup
        run: |
          docker image prune -f
          docker container prune -f --filter "until=24h"
